name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest
        env:
          SECRET_KEY: ci-test-secret-key-do-not-use-in-prod-abc1234567890
          ALGORITHM: HS256
          COOKIE_SECURE: "0"
          LLM_API_KEY: "sk-fake-key-for-ci"
          LLM_BASE_URL: "https://fake-llm-api.example.com"
          BOOTSTRAP_ADMIN_PASSWORD: "ci-bootstrap-pass"
