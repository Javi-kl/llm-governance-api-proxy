{% extends "base.html" %}
{% block title %}Iniciar sesión — LLM Governance Proxy{% endblock %}

{% block content %}
<div class="login-container">
    <h1>LLM Governance Proxy</h1>

    <form
        hx-post="/login"
        hx-target="this"
        hx-swap="outerHTML"
        class="login-form"
    >
        <div class="form-group">
            <label for="username">Usuario</label>
            <input
                type="text"
                id="username"
                name="username"
                required
                autocomplete="username"
                placeholder="Tu nombre de usuario"
            >
        </div>

        <div class="form-group">
            <label for="credential">PIN o contraseña</label>
            <input
                type="password"
                id="credential"
                name="credential"
                required
                autocomplete="current-password"
                placeholder="Tu PIN o contraseña"
            >
        </div>

        {% if error %}
        <p class="error-message">{{ error }}</p>
        {% endif %}

        <button type="submit" class="btn-primary">Entrar</button>
    </form>
</div>
{% endblock %}
